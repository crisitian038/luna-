<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna 👀</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
            background-color: #0a0a14;
        }
        canvas { display: block; }
        .title {
            position: fixed;
            top: 40px;
            right: 60px;
            font-size: clamp(32px, 6vw, 56px);
            font-weight: 400;
            font-style: italic;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.15em;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.25);
            z-index: 20;
            pointer-events: none;
            user-select: none;
            opacity: 0; /* Oculto inicialmente para animar */
            transform: translateY(-15px);
        }
        .instruction {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(12px, 1.8vw, 14px);
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.08em;
            z-index: 20;
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(14px, 3vw, 18px);
            z-index: 30;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        @media (max-width: 600px) {
            .title {
                top: 20px;
                right: 25px;
                font-size: clamp(28px, 8vw, 40px);
            }
            .instruction {
                bottom: 20px;
                font-size: clamp(11px, 3vw, 13px);
            }
        }
        @media (max-width: 400px) {
            .title {
                right: 15px;
                font-size: 26px;
                letter-spacing: 0.1em;
            }
            .instruction {
                font-size: 11px;
                bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="title" id="title">Luna</div>
    <div class="loading" id="loading">Cargando flor...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ---------- CONFIGURACIÓN BÁSICA ----------
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#0a0a14');
        scene.fog = new THREE.Fog('#0a0a14', 4, 15);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50);
        camera.position.set(3.5, 2.8, 5.2);
        camera.lookAt(0, 0.9, 0);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0.85, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.35;
        controls.minDistance = 2.8;
        controls.maxDistance = 9;
        controls.minPolarAngle = 0.9;
        controls.maxPolarAngle = 1.35;
        controls.update();

        const clock = new THREE.Clock();

        // ---------- LUCES ----------
        const ambientLight = new THREE.AmbientLight('#3a4a6c', 0.7);
        scene.add(ambientLight);
        const hemiLight = new THREE.HemisphereLight('#8899bb', '#1a1a2e', 0.55);
        scene.add(hemiLight);

        const mainSpotLight = new THREE.SpotLight('#fff8e7', 40, 15, Math.PI / 5.5, 0.25, 0.5);
        mainSpotLight.castShadow = true;
        mainSpotLight.shadow.mapSize.width = 1024;
        mainSpotLight.shadow.mapSize.height = 1024;
        mainSpotLight.shadow.camera.near = 0.8;
        mainSpotLight.shadow.camera.far = 20;
        mainSpotLight.shadow.bias = -0.0001;
        mainSpotLight.shadow.normalBias = 0.02;
        mainSpotLight.shadow.radius = 2.8;
        scene.add(mainSpotLight);

        const warmPointLight = new THREE.PointLight('#ffb7a7', 16, 4.5, 1.5);
        warmPointLight.position.set(0.2, 1.5, 0.5);
        scene.add(warmPointLight);

        const rimLight = new THREE.PointLight('#8899cc', 9, 5.5);
        rimLight.position.set(-1.8, 1.3, -1.5);
        scene.add(rimLight);

        const moonLight = new THREE.DirectionalLight('#c8d6ff', 0.9);
        moonLight.position.set(-1, 4, 2);
        scene.add(moonLight);

        // ---------- MATERIALES ----------
        const grassMaterial = new THREE.MeshStandardMaterial({ color: '#4a7c3f', roughness: 0.85, metalness: 0.02 });
        const dirtMaterial = new THREE.MeshStandardMaterial({ color: '#3e3329', roughness: 0.9, metalness: 0.01 });

        const mainGroup = new THREE.Group();
        scene.add(mainGroup);

        // ---------- ISLOTE ----------
        function createIsland() {
            const islandGroup = new THREE.Group();
            const dirtGeom = new THREE.CylinderGeometry(1.15, 1.35, 0.35, 48);
            const dirt = new THREE.Mesh(dirtGeom, dirtMaterial);
            dirt.position.y = 0.175;
            dirt.castShadow = true;
            dirt.receiveShadow = true;
            islandGroup.add(dirt);

            const grassGeom = new THREE.SphereGeometry(1.2, 48, 32, 0, Math.PI * 2, 0, Math.PI / 2);
            const grass = new THREE.Mesh(grassGeom, grassMaterial);
            grass.scale.set(1, 0.38, 1);
            grass.position.y = 0.35;
            grass.castShadow = true;
            grass.receiveShadow = true;
            islandGroup.add(grass);

            const bladeGeom = new THREE.ConeGeometry(0.025, 0.14, 5, 1);
            const bladeCount = 180;
            const blades = new THREE.InstancedMesh(bladeGeom, grassMaterial, bladeCount);
            blades.castShadow = true;
            blades.receiveShadow = true;
            const dummy = new THREE.Object3D();
            const surfaceYBase = 0.35;
            const radius = 1.18;
            const heightScale = 0.38;
            for (let i = 0; i < bladeCount; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI / 2.1;
                const x = Math.sin(phi) * Math.cos(theta);
                const z = Math.sin(phi) * Math.sin(theta);
                const y = Math.cos(phi);
                const posX = x * radius;
                const posZ = z * radius;
                const posY = surfaceYBase + y * radius * heightScale;
                dummy.position.set(posX, posY, posZ);
                dummy.rotation.set((Math.random() - 0.5) * 0.35, Math.random() * Math.PI * 2, (Math.random() - 0.5) * 0.35);
                dummy.scale.set(0.7 + Math.random() * 0.6, 0.7 + Math.random() * 0.8, 0.7 + Math.random() * 0.6);
                dummy.updateMatrix();
                blades.setMatrixAt(i, dummy.matrix);
            }
            blades.instanceMatrix.needsUpdate = true;
            islandGroup.add(blades);

            const stoneGeom = new THREE.IcosahedronGeometry(0.06, 1);
            const stoneMat = new THREE.MeshStandardMaterial({ color: '#6b5e53', roughness: 0.7, metalness: 0.05 });
            for (let i = 0; i < 15; i++) {
                const stone = new THREE.Mesh(stoneGeom, stoneMat);
                const angle = Math.random() * Math.PI * 2;
                const dist = 1.2 + Math.random() * 0.25;
                stone.position.set(Math.cos(angle) * dist, 0.08 + Math.random() * 0.15, Math.sin(angle) * dist);
                stone.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                stone.scale.setScalar(0.5 + Math.random() * 0.8);
                stone.castShadow = true;
                stone.receiveShadow = true;
                islandGroup.add(stone);
            }
            return islandGroup;
        }

        // ---------- PARTÍCULAS (LUCIÉRNAGAS MEJORADAS) ----------
        function createParticles() {
            // Partículas cercanas (alrededor de la flor, más densidad)
            const nearCount = 300;
            const nearPositions = new Float32Array(nearCount * 3);
            const nearOriginals = new Float32Array(nearCount * 3);
            const nearPhases = new Float32Array(nearCount);
            const spawnRadiusNear = 2.8;
            const centerY = 1.2;
            for (let i = 0; i < nearCount; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 0.5 + Math.random() * spawnRadiusNear;
                const x = Math.sin(phi) * Math.cos(theta) * r;
                const y = centerY + Math.sin(phi) * Math.sin(theta) * r;
                const z = Math.cos(phi) * r;
                nearPositions[i * 3] = x;
                nearPositions[i * 3 + 1] = y;
                nearPositions[i * 3 + 2] = z;
                nearOriginals[i * 3] = x;
                nearOriginals[i * 3 + 1] = y;
                nearOriginals[i * 3 + 2] = z;
                nearPhases[i] = Math.random() * Math.PI * 2;
            }
            const nearGeom = new THREE.BufferGeometry();
            nearGeom.setAttribute('position', new THREE.BufferAttribute(nearPositions, 3));
            
            // Textura de resplandor
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 200, 1)');
            gradient.addColorStop(0.15, 'rgba(255, 240, 180, 0.95)');
            gradient.addColorStop(0.4, 'rgba(255, 200, 100, 0.5)');
            gradient.addColorStop(0.7, 'rgba(180, 160, 80, 0.1)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            const texture = new THREE.CanvasTexture(canvas);
            
            const nearMaterial = new THREE.PointsMaterial({
                map: texture,
                color: '#ffe8a0',
                size: 0.18,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                opacity: 0.8
            });
            const nearParticles = new THREE.Points(nearGeom, nearMaterial);
            nearParticles.userData = { originals: nearOriginals, phases: nearPhases, geom: nearGeom };

            // Partículas lejanas (fondo, más extendidas)
            const farCount = 250;
            const farPositions = new Float32Array(farCount * 3);
            const farOriginals = new Float32Array(farCount * 3);
            const farPhases = new Float32Array(farCount);
            const spawnRadiusFar = 7.0;
            for (let i = 0; i < farCount; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 2.0 + Math.random() * spawnRadiusFar;
                const x = Math.sin(phi) * Math.cos(theta) * r;
                const y = centerY + Math.sin(phi) * Math.sin(theta) * r * 0.8;
                const z = Math.cos(phi) * r;
                farPositions[i * 3] = x;
                farPositions[i * 3 + 1] = y;
                farPositions[i * 3 + 2] = z;
                farOriginals[i * 3] = x;
                farOriginals[i * 3 + 1] = y;
                farOriginals[i * 3 + 2] = z;
                farPhases[i] = Math.random() * Math.PI * 2;
            }
            const farGeom = new THREE.BufferGeometry();
            farGeom.setAttribute('position', new THREE.BufferAttribute(farPositions, 3));
            const farMaterial = new THREE.PointsMaterial({
                map: texture,
                color: '#aaccff',
                size: 0.15,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                opacity: 0.5
            });
            const farParticles = new THREE.Points(farGeom, farMaterial);
            farParticles.userData = { originals: farOriginals, phases: farPhases, geom: farGeom };

            const group = new THREE.Group();
            group.add(nearParticles);
            group.add(farParticles);
            return group;
        }

        const island = createIsland();
        mainGroup.add(island);
        const particlesGroup = createParticles();
        mainGroup.add(particlesGroup);

        // Partículas de suelo adicionales
        const groundParticlesGeom = new THREE.BufferGeometry();
        const groundCount = 60;
        const groundPositionsArr = new Float32Array(groundCount * 3);
        for (let i = 0; i < groundCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = 0.7 + Math.random() * 1.4;
            groundPositionsArr[i * 3] = Math.cos(angle) * dist;
            groundPositionsArr[i * 3 + 1] = 0.15 + Math.random() * 0.7;
            groundPositionsArr[i * 3 + 2] = Math.sin(angle) * dist;
        }
        groundParticlesGeom.setAttribute('position', new THREE.BufferAttribute(groundPositionsArr, 3));
        const groundParticles = new THREE.Points(groundParticlesGeom, new THREE.PointsMaterial({
            color: '#aaccff', size: 0.04, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.5
        }));
        mainGroup.add(groundParticles);

        // ---------- CARGA DEL MODELO GLB ----------
        const loader = new GLTFLoader();
        let flowerModel = null;
        const loadingEl = document.getElementById('loading');

        loader.load(
            './flower.glb',
            (gltf) => {
                flowerModel = gltf.scene;
                flowerModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        if (child.material) {
                            child.material.roughness = Math.min(child.material.roughness || 0.5, 0.4);
                            child.material.metalness = Math.min(child.material.metalness || 0.1, 0.15);
                        }
                    }
                });

                flowerModel.updateMatrixWorld();
                const box = new THREE.Box3().setFromObject(flowerModel);
                const size = box.getSize(new THREE.Vector3());
                const targetHeight = 1.2;
                if (size.y > 0.001) {
                    const scaleFactor = targetHeight / size.y;
                    flowerModel.scale.set(scaleFactor, scaleFactor, scaleFactor);
                    flowerModel.updateMatrixWorld();
                    box.setFromObject(flowerModel);
                }
                const desiredBaseY = 0.7;
                flowerModel.position.y = desiredBaseY - box.min.y;
                const center = box.getCenter(new THREE.Vector3());
                flowerModel.position.x = -center.x;
                flowerModel.position.z = -center.z;

                mainGroup.add(flowerModel);
                loadingEl.style.opacity = '0';
                setTimeout(() => loadingEl.remove(), 500);
                console.log('🌸 Flor cargada y ajustada');
            },
            (progress) => {
                const percent = Math.round((progress.loaded / progress.total) * 100);
                loadingEl.textContent = `Cargando flor... ${percent}%`;
            },
            (error) => {
                console.error('Error al cargar el modelo:', error);
                loadingEl.textContent = 'Error al cargar la flor. Verifica la consola.';
                loadingEl.style.color = 'rgba(255, 100, 100, 0.9)';
            }
        );

        // ---------- ANIMACIONES DE ENTRADA ----------
        // Isla aparece con escala y rotación
        mainGroup.scale.set(0, 0, 0);
        gsap.to(mainGroup.scale, {
            x: 1, y: 1, z: 1, duration: 1.8, ease: 'elastic.out(1, 0.55)', delay: 0.3
        });
        gsap.from(mainGroup.rotation, { y: -0.5, duration: 2.2, ease: 'power3.out', delay: 0.2 });

        // Animación del título "Luna"
        gsap.to('#title', {
            opacity: 1,
            y: 0,
            duration: 1.2,
            delay: 0.8,
            ease: 'power2.out'
        });

        // ---------- BUCLE DE ANIMACIÓN ----------
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Luz principal sigue a la cámara
            const camPos = camera.position;
            const target = controls.target;
            const dirToCamera = new THREE.Vector3().subVectors(camPos, target).normalize();
            const camRight = new THREE.Vector3().crossVectors(dirToCamera, camera.up).normalize();
            const camUp = camera.up.clone().normalize();
            const lightOffset = dirToCamera.clone().multiplyScalar(1.8)
                .add(camRight.clone().multiplyScalar(1.2))
                .add(camUp.clone().multiplyScalar(1.5));
            mainSpotLight.position.copy(target.clone().add(lightOffset));
            mainSpotLight.lookAt(target);

            // Animar todas las partículas
            const updateParticleSystem = (system) => {
                if (!system.userData) return;
                const positions = system.userData.geom.attributes.position.array;
                const originals = system.userData.originals;
                const phases = system.userData.phases;
                for (let i = 0; i < positions.length / 3; i++) {
                    const idx = i * 3;
                    const phase = phases[i];
                    positions[idx] = originals[idx] + Math.cos(time * 0.6 + phase * 1.3) * 0.15;
                    positions[idx + 1] = originals[idx + 1] + Math.sin(time * 0.7 + phase) * 0.2;
                    positions[idx + 2] = originals[idx + 2] + Math.sin(time * 0.55 + phase * 0.7) * 0.15;
                }
                system.userData.geom.attributes.position.needsUpdate = true;
                system.material.opacity = 0.6 + Math.sin(time * 1.2 + system.userData.phases[0]) * 0.15;
            };

            // Recorremos los dos sistemas dentro del grupo
            particlesGroup.children.forEach(child => updateParticleSystem(child));

            // Partículas del suelo
            groundParticles.rotation.y += 0.0008;
            groundParticles.material.opacity = 0.35 + Math.sin(time * 0.9) * 0.15;

            if (flowerModel) {
                flowerModel.rotation.z = Math.sin(time * 0.5) * 0.02;
                flowerModel.rotation.x = Math.cos(time * 0.45) * 0.015;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
